name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production/staging deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare Files
        run: |
          mkdir -p _site
          if [ "${{ github.ref_name }}" = "staging" ]; then
            # Copy staging files (current checkout) to _site/staging/
            mkdir -p _site/staging
            rsync -av --exclude='_site' --exclude='.git' --exclude='.github' ./ _site/staging/
            
            # Fetch and copy main files (production) to _site/
            mkdir -p temp_main
            git clone --branch main --depth 1 https://github.com/uscis-tracker/uscis-tracker.github.io.git temp_main
            rsync -av --exclude='.git' --exclude='.github' temp_main/ _site/
            rm -rf temp_main
          else
            # Copy main files (current checkout) to _site/
            rsync -av --exclude='_site' --exclude='.git' --exclude='.github' ./ _site/
            
            # Fetch and copy staging files to _site/staging/
            mkdir -p temp_staging
            git clone --branch staging --depth 1 https://github.com/uscis-tracker/uscis-tracker.github.io.git temp_staging
            mkdir -p _site/staging
            rsync -av --exclude='.git' --exclude='.github' temp_staging/ _site/staging/
            rm -rf temp_staging
          fi

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
