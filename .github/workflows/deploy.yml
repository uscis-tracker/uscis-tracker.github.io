name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - staging

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production/staging deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare Files
        run: |
          mkdir -p _site
          if [ "${{ github.ref_name }}" = "staging" ]; then
            # For the staging branch, place the site files into a 'staging' subdirectory so it is served at /staging/
            mkdir -p _site/staging
            rsync -av --exclude='_site' --exclude='.git' --exclude='.github' --exclude='staging' ./ _site/staging/
          else
            # For the main branch, deploy production to the root, and also preserve the staging folder if it exists in the repo
            rsync -av --exclude='_site' --exclude='.git' --exclude='.github' ./ _site/
          fi

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
